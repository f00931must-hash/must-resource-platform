<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MRP Admin</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="./css/admin.css">
</head>
<body>
<div id="loginView" class="login-view"><div class="login-card"><div class="logo">M</div><h1>MUST Resource Platform</h1><p>請使用授權 Google 帳號登入後台。</p><button id="loginBtn" class="primary-btn wide">使用 Google 登入</button><a href="../frontend/" class="text-link">回前台</a></div></div>
<div id="appView" class="admin-shell hidden">
<aside class="sidebar"><div class="brand"><div class="logo small-logo">M</div><div><strong>資源教室</strong><span>管理平台</span></div></div><nav><button class="nav-item active" data-view="dashboard">🏠 儀表板</button><button class="nav-item" data-view="posts">📢 公告管理</button><button class="nav-item" data-view="library">📁 附件中心</button><button class="nav-item" data-view="settings">⚙ 系統設定</button></nav><div class="side-note"><strong>不放個資原則</strong><p>此平台只放公開資訊。</p></div></aside>
<main class="dashboard"><header class="dash-header"><div><div class="eyebrow">Dashboard</div><h1 id="pageTitle">儀表板</h1></div><div class="user-box"><span id="userInfo"></span><button id="logoutBtn" class="ghost-btn">登出</button></div></header>
<section id="view-dashboard" class="view"><section class="stats"><div class="stat-card"><span>全部內容</span><strong id="statTotal">0</strong></div><div class="stat-card"><span>已發布</span><strong id="statPublished">0</strong></div><div class="stat-card"><span>草稿</span><strong id="statDraft">0</strong></div><div class="stat-card"><span>附件數</span><strong id="statFiles">0</strong></div></section><section class="panel"><div class="panel-head"><h2>最近內容</h2></div><div id="recentList" class="admin-list">載入中...</div></section></section>
<section id="view-posts" class="view hidden"><section class="editor-layout"><form id="postForm" class="panel editor-panel"><div class="panel-head"><h2 id="formTitle">新增內容</h2><button type="button" id="resetBtn" class="ghost-btn">清空</button></div><input type="hidden" id="editId"><label>標題</label><input id="title" class="field"><div class="two-col"><div><label>分類</label><select id="category" class="field"><option>公告</option><option>活動</option><option>修課通知</option><option>獎助學金</option><option>其他</option></select></div><div><label>日期</label><input id="date" type="date" class="field"></div></div><div class="two-col"><label class="switch-line"><input id="published" type="checkbox" checked><span>發布到前台</span></label><label class="switch-line"><input id="pinned" type="checkbox"><span>置頂 / 重要</span></label></div><label>內容</label><textarea id="content" class="field content-field"></textarea>
<label>圖片</label><div id="imageDrop" class="dropzone"><strong>🖼 拖曳圖片到這裡</strong><span>或點擊選擇圖片，也可以貼圖片網址</span><input id="imageInput" type="file" accept="image/*" multiple hidden></div><textarea id="imageUrlInput" class="field mini-area" placeholder="圖片網址或路徑，每行一個"></textarea><div id="imagePreview" class="preview-list"></div>
<label>附件</label><div id="fileDrop" class="dropzone"><strong>📎 拖曳 PDF / Word / Excel 到這裡</strong><span>或點擊選擇附件，也可以貼附件網址</span><input id="fileInput" type="file" multiple hidden></div><textarea id="fileUrlInput" class="field mini-area" placeholder="附件名稱|網址或路徑，每行一個"></textarea><div id="filePreview" class="preview-list"></div>
<button id="saveBtn" class="primary-btn wide">發布 / 儲存</button></form><section class="panel"><div class="panel-head"><h2>內容列表</h2><input id="adminSearch" class="field mini-search" placeholder="搜尋內容..."></div><div id="postList" class="admin-list">載入中...</div></section></section></section>
<section id="view-library" class="view hidden"><section class="panel"><h2>📁 附件中心</h2><div id="libraryList"></div></section></section>
<section id="view-settings" class="view hidden"><section class="panel"><h2>⚙ 系統設定</h2><p>GitHub Token 只存在此瀏覽器，用於拖曳上傳檔案到 Repository。</p><label>GitHub Token</label><input id="githubToken" class="field" type="password" placeholder="貼上 fine-grained token"><button id="saveTokenBtn" class="primary-btn">儲存 Token</button><button id="clearTokenBtn" class="ghost-btn">清除 Token</button></section></section>
</main></div>
<script type="module" src="./js/admin.js"></script>
</body></html>
